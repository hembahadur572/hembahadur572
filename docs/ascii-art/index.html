<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Art Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c26;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --text-muted: #8888aa;
            --accent: #00f5d4;
            --accent-dim: rgba(0, 245, 212, 0.15);
            --font-mono: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        header h1 span { color: var(--accent); }
        header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text); background: var(--surface2); }
        .tab-btn.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }
        textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
            font-family: var(--font-mono);
            line-height: 1.5;
        }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--border); }
        .btn-primary {
            background: var(--accent);
            color: #001219;
            border-color: var(--accent);
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #00d4b8;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.3);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .output-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .output-section .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .output-section .header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .output-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            overflow: auto;
            min-height: 200px;
            max-height: 500px;
            font-family: var(--font-mono);
            font-size: 10px;
            line-height: 1.1;
            white-space: pre;
            color: var(--accent);
        }
        .output-box.color { color: inherit; }

        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .settings-row input[type="range"] {
            width: 120px;
            padding: 0;
            background: transparent;
            accent-color: var(--accent);
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .drop-zone .icon { font-size: 40px; margin-bottom: 8px; }
        .drop-zone p { color: var(--text-muted); font-size: 14px; }
        .drop-zone p strong { color: var(--accent); }
        #image-preview { max-width: 100%; max-height: 200px; border-radius: 8px; display: none; margin-top: 12px; }

        @media (max-width: 768px) {
            header { padding: 16px; }
            header h1 { font-size: 17px; }
            .container { padding: 16px; gap: 16px; }
            .controls { flex-direction: column; }
            .output-box { font-size: 7px; min-height: 150px; }
            .tabs .tab-btn { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>✦ <span>ASCII</span> Art Generator</h1>
        <div class="subtitle">No external deps · Works everywhere</div>
    </div>
</header>

<div class="container">

    <div class="tabs">
        <button class="tab-btn active" data-tab="text">⌨️ Text to ASCII</button>
        <button class="tab-btn" data-tab="image">🖼️ Image to ASCII</button>
    </div>

    <!-- TEXT PANEL -->
    <div class="panel active" id="panel-text">
        <div class="controls">
            <div class="control-group" style="flex:1">
                <label>Your Text</label>
                <textarea id="text-input" placeholder="Type something...">SACHIN</textarea>
            </div>
            <div class="control-group">
                <label>Font</label>
                <select id="font-select">
                    <option value="big">Big</option>
                    <option value="block" selected>Block</option>
                    <option value="3d">3D</option>
                    <option value="slant">Slant</option>
                    <option value="banner">Banner</option>
                    <option value="rounded">Rounded</option>
                    <option value="small">Small</option>
                    <option value="starwars">Star Wars</option>
                    <option value="graffiti">Graffiti</option>
                    <option value="cyber">Cyber</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="generate-text">⚡ Generate</button>
            </div>
        </div>

        <div class="output-section" style="margin-top:16px">
            <div class="header">
                <h2>📟 Output</h2>
                <div class="btn-row">
                    <button class="btn" id="copy-text">📋 Copy</button>
                    <button class="btn" id="download-text">⬇️ Download</button>
                </div>
            </div>
            <div class="output-box" id="text-output">
                Click "Generate" to create your ASCII art!
            </div>
        </div>
    </div>

    <!-- IMAGE PANEL -->
    <div class="panel" id="panel-image">
        <div class="settings-row">
            <div class="control-group">
                <label>Width (chars)</label>
                <input type="range" id="char-width" min="40" max="200" value="100" />
                <span id="char-width-val" style="font-size:12px;color:var(--text-muted)">100</span>
            </div>
            <div class="control-group">
                <label>Character Set</label>
                <select id="char-set">
                    <option value="standard">Standard ░▒▓█</option>
                    <option value="detailed" selected>Detailed @%#*+=-:. </option>
                    <option value="blocks">Blocks █▓▒░ </option>
                </select>
            </div>
            <div class="control-group">
                <label>Color</label>
                <select id="color-mode">
                    <option value="none">Monochrome</option>
                    <option value="ansi" selected>ANSI Color</option>
                </select>
            </div>
            <div class="control-group">
                <label>Invert</label>
                <select id="invert-mode">
                    <option value="false">Normal</option>
                    <option value="true">Inverted</option>
                </select>
            </div>
        </div>

        <div class="drop-zone" id="drop-zone">
            <div class="icon">🖼️</div>
            <p><strong>Click</strong> to upload or <strong>drag & drop</strong> an image</p>
            <p style="font-size:12px;margin-top:4px;color:var(--text-muted)">PNG, JPG, WEBP, GIF</p>
            <input type="file" id="file-input" accept="image/*" style="display:none" />
            <img id="image-preview" alt="Preview" />
        </div>

        <div class="btn-row" style="margin-top:12px">
            <button class="btn btn-primary" id="convert-image">🎨 Convert</button>
        </div>

        <div class="output-section" style="margin-top:16px">
            <div class="header">
                <h2>📟 Output</h2>
                <div class="btn-row">
                    <button class="btn" id="copy-image">📋 Copy</button>
                    <button class="btn" id="download-image">⬇️ Download</button>
                </div>
            </div>
            <div class="output-box" id="image-output">
                Upload an image and click Convert ✨
            </div>
        </div>
    </div>

</div>

<script>
// ============================================================
//  BUILT-IN FONTS — no external dependencies!
//  Each font is a char -> array-of-rows mapping
// ============================================================

const FONTS = {};

// ---- BIG FONT ----
FONTS.big = (() => {
    const c = {};
    const R = [
        ['  ___  ', ' / _ \\ ', '| | | |', '| |_| |', ' \\___/ '],
        [' __ ', '/_ |', ' | |', ' | |', ' |_|', ' (_)'],
        [' ____  ', '|___ \\ ', '  __) |', ' / __/ ', '|_____|'],
        [' _____ ', '|___ / ', '  |_ \\ ', ' ___) |', '|____/ '],
        [' _  _   ', '| || |  ', '| || |_ ', '|__   _|', '  |_|  '],
        [' ____  ', '| ___|', '|___ \\ ', ' ___) |', '|____/ '],
        ['  __   ', ' / /_  ', '| \'_ \\ ', '| (_) |', ' \\___/ '],
        [' ____  ', '|___ \\ ', '  __) |', ' / __/ ', '|_____|'],
        ['  ___  ', ' / _ \\ ', '| (_) |', ' \\__, |', '  /_/ '],
        ['  ___  ', ' / _ \\ ', '| (_) |', ' \\__, |', '   /_/ ']
    ];
    const U = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const M = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    for (let i = 0; i < 26; i++) c[M[i]] = R[i];
    // Lowercase
    for (let k in c) c[k.toLowerCase()] = c[k];
    // Numbers
    const NUM = [
        ['  ___  ', ' / _ \\ ', '| | | |', '| |_| |', ' \\___/ '],
        [' __ ', '/_ |', ' | |', ' | |', ' |_|', ' (_)'],
        [' ____  ', '|___ \\ ', '  __) |', ' / __/ ', '|_____|'],
        [' _____ ', '|___ / ', '  |_ \\ ', ' ___) |', '|____/ '],
        [' _  _   ', '| || |  ', '| || |_ ', '|__   _|', '  |_|  '],
        [' ____  ', '| ___|', '|___ \\ ', ' ___) |', '|____/ '],
        ['  __   ', ' / /_  ', '| \'_ \\ ', '| (_) |', ' \\___/ '],
        [' ____  ', '|___ \\ ', '  __) |', ' / __/ ', '|_____|'],
        ['  ___  ', ' / _ \\ ', '| (_) |', ' \\__, |', '  /_/ '],
        ['  ___  ', ' / _ \\ ', '| (_) |', ' \\__, |', '   /_/ ']
    ];
    for (let i = 0; i < 10; i++) c[String(i)] = NUM[i];
    c[' '] = ['     ', '     ', '     ', '     ', '     '];
    c['!'] = [' _ ', '| |', '| |', '|_|', '(_)'];
    c['?'] = ['  ___  ', ' / _ \\ ', '| (_) |', ' \\__, |', '   /_/ '];
    c['.'] = ['   ', '   ', '   ', ' _ ', '(_)'];
    c[','] = ['   ', '   ', '   ', ' _ ', '(_)'];
    c['@'] = c['A'];
    c['#'] = c['H'];
    c['$'] = c['S'];
    c['%'] = c['X'];
    c['&'] = c['E'];
    c['*'] = c['X'];
    c['+'] = c['T'];
    return c;
})();

FONTS.block = (() => {
    const R = {

// ============================================================
//  TEXT RENDERER
// ============================================================

function renderText(text, fontName) {
    const font = FONTS[fontName] || FONTS.block;
    const chars = text.split('');

    // Get the height from the first available character
    let height = 5;
    for (let ch of chars) {
        if (font[ch]) { height = font[ch].length; break; }
    }

    // Build each line
    const lines = [];
    for (let row = 0; row < height; row++) {
        let line = '';
        for (let ch of chars) {
            const glyph = font[ch];
            if (glyph && row < glyph.length) {
                line += glyph[row];
            } else if (glyph) {
                line += ' '.repeat(glyph[0] ? glyph[0].length : 1);
            } else {
                // Character not found - use fallback
                line += ' ' + ch + ' ';
            }
        }
        // Trim trailing spaces but keep at least one
        lines.push(line.replace(/\s+$/, '') || ' ');
    }

    return lines.join('\n');
}

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
});

// Text Generator
const textInput = document.getElementById('text-input');
const fontSelect = document.getElementById('font-select');
const textOutput = document.getElementById('text-output');
const generateBtn = document.getElementById('generate-text');

function generateText() {
    const text = textInput.value.trim() || 'Hello!';
    const font = fontSelect.value;
    try {
        const result = renderText(text.toUpperCase(), font);
        textOutput.textContent = result;
    } catch(e) {
        textOutput.textContent = 'Error: ' + e.message;
    }
}

generateBtn.addEventListener('click', generateText);
textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) generateText();
});

// Initial generation
setTimeout(generateText, 100);

// Copy
document.getElementById('copy-text').addEventListener('click', () => {
    navigator.clipboard.writeText(textOutput.textContent).then(() => {
        const btn = document.getElementById('copy-text');
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy', 1500);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = textOutput.textContent;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        alert('Copied!');
    });
});

// Download
document.getElementById('download-text').addEventListener('click', () => {
    const blob = new Blob([textOutput.textContent], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ascii-art.txt';
    a.click();
});

// ============================================================
//  IMAGE TO ASCII (fully self-contained, canvas-based)
// ============================================================

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const imagePreview = document.getElementById('image-preview');
const convertBtn = document.getElementById('convert-image');
const imageOutput = document.getElementById('image-output');
const charWidthSlider = document.getElementById('char-width');
const charWidthVal = document.getElementById('char-width-val');
const charSetSelect = document.getElementById('char-set');
const colorModeSelect = document.getElementById('color-mode');
const invertSelect = document.getElementById('invert-mode');

let uploadedImage = null;

const CHAR_SETS = {
    'standard': ' .,:;ox%#@',
    'detailed': ' .:-=+*#%@',
    'blocks': ' ░▒▓█'
};

charWidthSlider.addEventListener('input', () => {
    charWidthVal.textContent = charWidthSlider.value;
});

dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) loadImage(e.target.files[0]);
});

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            uploadedImage = img;
            imagePreview.src = e.target.result;
            imagePreview.style.display = 'block';
            dropZone.querySelector('p').textContent = '📸 Image loaded!';
            dropZone.querySelector('.icon').textContent = '✅';
            convertImage();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function convertImage() {
    if (!uploadedImage) {
        imageOutput.textContent = '⚠️ Upload an image first!';
        return;
    }

    const targetWidth = parseInt(charWidthSlider.value);
    const chars = CHAR_SETS[charSetSelect.value] || CHAR_SETS.detailed;
    const colorMode = colorModeSelect.value;
    const invert = invertSelect.value === 'true';

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const aspect = uploadedImage.height / uploadedImage.width;
    const w = targetWidth;
    const h = Math.floor(w * aspect * 0.5);

    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(uploadedImage, 0, 0, w, h);

    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;

    let result = '';

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const idx = (y * w + x) * 4;
            let r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];

            if (a < 128) { result += ' '; continue; }

            let gray = 0.299 * r + 0.587 * g + 0.114 * b;
            if (invert) gray = 255 - gray;

            const charIdx = Math.floor((gray / 255) * (chars.length - 1));
            const char = chars[chars.length - 1 - charIdx];

            if (colorMode === 'ansi') {
                const ri = Math.round(r / 51);
                const gi = Math.round(g / 51);
                const bi = Math.round(b / 51);
                const ansiCode = 16 + (ri * 36) + (gi * 6) + bi;
                result += String.fromCharCode(0x1B) + '[38;5;' + ansiCode + 'm' + char + String.fromCharCode(0x1B) + '[0m';
            } else {
                result += char;
            }
        }
        result += '\n';
    }

    // Remove ANSI for display (we keep text content clean)
    const clean = result.replace(/\x1b\[[0-9;]*m/g, '');
    imageOutput.textContent = clean;
    imageOutput.classList.remove('color');
}

convertBtn.addEventListener('click', convertImage);

document.getElementById('copy-image').addEventListener('click', () => {
    const text = imageOutput.textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-image');
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy', 1500);
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        alert('Copied!');
    });
});

document.getElementById('download-image').addEventListener('click', () => {
    const blob = new Blob([imageOutput.textContent], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ascii-image.txt';
    a.click();
});

// Auto-convert image on settings change
charWidthSlider.addEventListener('change', () => { if (uploadedImage) convertImage(); });
charSetSelect.addEventListener('change', () => { if (uploadedImage) convertImage(); });
colorModeSelect.addEventListener('change', () => { if (uploadedImage) convertImage(); });
invertSelect.addEventListener('change', () => { if (uploadedImage) convertImage(); });
</script>
